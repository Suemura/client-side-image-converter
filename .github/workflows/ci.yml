# PR と main への push で lint / typecheck / test / build を自動実行する CI
# public リポジトリのため標準ランナーは無料（分数無制限）
name: CI

on:
  pull_request:
  push:
    branches: [main]

# 同一ブランチで新しい push があったら古い実行をキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      # ローカル開発環境（Node 24 / npm 11）と揃える。
      # npm 10（Node 22 同梱）は同じ lockfile を不完全と判定し npm ci が失敗するため
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: 依存関係のインストール
        run: npm ci

      - name: Lint（Biome）
        run: npm run lint

      - name: 型チェック
        run: npm run typecheck

      - name: 単体テスト（vitest）
        run: npm run test

      - name: ビルド（静的エクスポート）
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: 依存関係のインストール
        run: npm ci

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: E2E テスト（Playwright）
        run: npm run e2e

      - name: 失敗時にレポートをアップロード
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
